{{!--
This template displays a delete icon and assumes it's nested within
an item list and can find a data-item-id attribute in a nearby parent.
--}}

{{#if (not isLocked)}}
<span class="fa-stack item-delete clickable"
      title="Delete {{label}}"
      style="cursor: pointer;"
>
    <i class="fas fa-circle fa-stack-2x grey"></i>
    <i class="fas fa-trash-can fa-stack-1x fa-inverse"></i>
</span>
{{/if}}
